<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">
  <title>Strategy Board — Maintenance</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0f14;
      color: #eef2f7;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 0%, rgba(62, 125, 255, 0.14), transparent 42%),
        #0b0f14;
    }

    main {
      width: min(620px, 100%);
      padding: clamp(28px, 6vw, 48px);
      border: 1px solid #253142;
      border-radius: 18px;
      background: rgba(16, 23, 32, 0.92);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 22px;
      color: #a9c4ff;
      font-size: 0.78rem;
      font-weight: 750;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .status::before {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #5b8cff;
      box-shadow: 0 0 18px rgba(91, 140, 255, 0.8);
      content: "";
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 3.4rem);
      line-height: 1.02;
      letter-spacing: -0.045em;
    }

    p {
      max-width: 52ch;
      margin: 22px 0 0;
      color: #aab5c5;
      font-size: 1.02rem;
      line-height: 1.7;
    }

    footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #253142;
      color: #6f7d90;
      font-size: 0.84rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="status">Maintenance in progress</div>
    <h1>Strategy Board is temporarily unavailable.</h1>
    <p>
      Publication controls and data-rights safeguards are being upgraded.
      No market data, portfolio information, or trade instructions are published here.
    </p>
    <footer>Private investment-intelligence workspace</footer>
  </main>
</body>
</html>
